window.toggleSidebar = function() {

    const content = document.getElementById('content');
    
    if (sidebar && content) {
        sidebar.classList.toggle('active');

    } else {
        console.error('Sidebar or content element not found!');

        console.log('Content:', content);

};

// Use the globally initialized supabaseClient from window scope
const supabaseClient = window.supabaseClient;

function showHome() {
    var homePage = document.getElementById('homePage');
    var formPage = document.getElementById('formPage');
    homePage.classList.remove('hidden');
    formPage.classList.add('hidden');
    loadData();
}

function showForm() {
    var homePage = document.getElementById('homePage');
    var formPage = document.getElementById('formPage');
    homePage.classList.add('hidden');
    formPage.classList.remove('hidden');

    var now = new Date();
    document.getElementById('inDate').value = now.toISOString().split('T')[0];
    document.getElementById('inTime').value = now.toTimeString().slice(0, 5);
    document.getElementById('staffList').innerHTML = '';
}

function addStaffRow() {
    var staffList = document.getElementById('staffList');
    var select = document.createElement('select');
    select.className = 'form-select mb-2 staff-select';
    select.required = true;
    var options = '<option value="">-- Pilih Petugas --</option>';
    options += '<option value="Yeffi Suwono Putra">Yeffi S.Putra</option>';
    options += '<option value="Muhammad Abduh">Muhammad Abduh</option>';
    options += '<option value="Rangga Swardani Abadi">Rangga SWA</option>';
    options += '<option value="Herdin Jonathan Sibarani">Herdin Jo</option>';
    options += '<option value="Febri Antoni">Febri Antoni</option>';
    options += '<option value="Febriko Dwi Fatmi">Febriko DF</option>';
    options += '<option value="Andi Duriamin Siregar">Andi DS</option>';
    select.innerHTML = options;
    staffList.appendChild(select);
}

function addPhotoRow() {
    var input = document.createElement('input');
    input.type = 'file';
    input.className = 'form-control mb-2 photo-input';
    input.accept = 'image/*';
    input.onchange = function() { handleFile(this); };
    document.getElementById('photoList').appendChild(input);
}

function handleFile(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'img-preview';
            document.getElementById('previewBox').appendChild(img);
            input.dataset.blob = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function handleSubmit(e) {
    e.preventDefault();
    var btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerText = "Menyimpan...";

    var petugasArray = [];
    var staffSelects = document.querySelectorAll('#staffList .staff-select');
    for (var i = 0; i < staffSelects.length; i++) {
        if (staffSelects[i].value.trim() !== '') {
            petugasArray.push(staffSelects[i].value.trim());
        }
    }

    var photoInputs = document.querySelectorAll('.photo-input');
    var fotoArray = [];
    for (var j = 0; j < photoInputs.length; j++) {
        if (photoInputs[j].dataset.blob) {
            fotoArray.push(photoInputs[j].dataset.blob);
        }
    }

    var payload = {
        tanggal: document.getElementById('inDate').value,
        waktu: document.getElementById('inTime').value,
        area: document.getElementById('logArea').value,
        petugas: petugasArray,
        keterangan: document.getElementById('inDesc').value,
        foto: fotoArray
    };

    if (supabaseClient) {
        supabaseClient.from('logbook_daily').insert([payload]).then(function(result) {
            var data = result.data;
            var error = result.error;
            if (error) {
                console.error("handleSubmit insert error:", error);
                alert("Error: " + error.message);
            } else {
                alert("Data Berhasil Disimpan!");
                document.getElementById('logForm').reset();
                document.getElementById('staffList').innerHTML = '';
                document.getElementById('previewBox').innerHTML = '';
                showHome();
            }
            btn.disabled = false;
            btn.innerText = "Simpan Data";
        }).catch(function(err) {
            console.error("handleSubmit unexpected error:", err);
            alert("Error: " + (err && err.message ? err.message : "Terjadi kesalahan saat menyimpan data"));
            btn.disabled = false;
            btn.innerText = "Simpan Data";
        });
    } else {
        alert("Supabase not initialized");
        btn.disabled = false;
        btn.innerText = "Simpan Data";
    }
    return false;
}

function renderLogRows(tbody, data) {
    tbody.innerHTML = '';
    for (var i = 0; i < data.length; i++) {
        var log = data[i];
        var row = document.createElement('tr');
        
        var petugasBadges = '';
        var petugasList = Array.isArray(log.petugas) ? log.petugas : [];
        for (var j = 0; j < petugasList.length; j++) {
            petugasBadges += '<span class="badge bg-light text-dark border">' + petugasList[j] + '</span> ';
        }
        
        var fotoImages = '';
        var fotoList = Array.isArray(log.foto) ? log.foto : [];
        for (var k = 0; k < fotoList.length; k++) {
            fotoImages += '<img src="' + fotoList[k] + '" class="img-preview">';
        }
        
        row.innerHTML = '<td class="ps-3"><strong>' + log.tanggal + '</strong><br><small>' + log.waktu + ' | ' + log.area + '</small></td>' +
            '<td>' + petugasBadges + '</td>' +
            '<td><small>' + log.keterangan + '</small></td>' +
            '<td>' + fotoImages + '</td>' +
            '<td class="text-center"><button class="btn btn-sm btn-outline-danger" onclick="deleteData(' + log.id + ')"><i class="bi bi-trash"></i></button></td>';
        tbody.appendChild(row);
    }
}

function loadData() {
    var tbody = document.getElementById('logTableBody');
    tbody.innerHTML = '<tr><td colspan="5" class="text-center">Memuat data...</td></tr>';

    if (!supabaseClient) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-warning">Supabase not initialized</td></tr>';
        return;
    }

    // Batasi jumlah data agar query tidak timeout saat data/foto sudah besar
    var primaryLimit = 100;
    var fallbackLimit = 40;

    function runQuery(limitValue) {
        return supabaseClient
            .from('logbook_daily')
            .select('id,tanggal,waktu,area,petugas,keterangan,foto')
            .order('tanggal', { ascending: false })
            .order('waktu', { ascending: false })
            .limit(limitValue);
    }

    runQuery(primaryLimit).then(function(result) {
        var data = result.data;
        var error = result.error;

        if (error) {
            var isTimeout = error.code === '57014' || (error.message && error.message.toLowerCase().indexOf('statement timeout') !== -1);
            if (isTimeout) {
                console.warn('loadData timeout on primary query, retrying with smaller limit...');
                runQuery(fallbackLimit).then(function(fallbackResult) {
                    var fallbackData = fallbackResult.data;
                    var fallbackError = fallbackResult.error;

                    if (fallbackError) {
                        console.error("loadData fallback error:", fallbackError);
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error memuat data: ' + fallbackError.message + '</td></tr>';
                        return;
                    }

                    if (!Array.isArray(fallbackData)) {
                        console.error("loadData fallback invalid format:", fallbackData);
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Format data tidak valid</td></tr>';
                        return;
                    }

                    renderLogRows(tbody, fallbackData);
                    if (fallbackData.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Belum ada data</td></tr>';
                    }
                }).catch(function(fallbackErr) {
                    console.error("loadData fallback unexpected error:", fallbackErr);
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Terjadi kesalahan saat memuat data</td></tr>';
                });
                return;
            }

            console.error("loadData error:", error);
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error memuat data: ' + error.message + '</td></tr>';
            return;
        }

        if (!Array.isArray(data)) {
            console.error("loadData invalid format:", data);
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Format data tidak valid</td></tr>';
            return;
        }

        renderLogRows(tbody, data);
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Belum ada data</td></tr>';
        }
    }).catch(function(err) {
        console.error("loadData unexpected error:", err);
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Terjadi kesalahan saat memuat data</td></tr>';
    });
}

function deleteData(id) {
    if (!supabaseClient) {
        alert("Supabase not initialized");
        return;
    }

    if (confirm("Hapus logbook ini?")) {
        supabaseClient.from('logbook_daily').delete().eq('id', id).then(function(result) {
            var error = result.error;
            if (error) {
                console.error("deleteData error:", error);
                alert("Error: " + error.message);
            } else {
                loadData();
            }
        }).catch(function(err) {
            console.error("deleteData unexpected error:", err);
            alert("Terjadi kesalahan saat menghapus data");
        });
    }
}

function fetchForPrint() {
    var from = document.getElementById('filterFrom').value;
    var to = document.getElementById('filterTo').value;
    if(!from || !to) {
        alert("Pilih rentang tanggal!");
        return;
    }

    if (!supabaseClient) {
        alert("Supabase not initialized");
        return;
    }

    supabaseClient.from('logbook_daily')
        .select('id,tanggal,waktu,area,petugas,keterangan,foto')
        .gte('tanggal', from)
        .lte('tanggal', to)
        .order('tanggal', { ascending: true })
        .order('waktu', { ascending: true })
        .limit(500)
        .then(function(result) {
        var data = result.data;
        var error = result.error;

        if(error) {
            console.error("fetchForPrint error:", error);
            alert("Error: " + error.message);
            return;
        }
        
        var printData = Array.isArray(data) ? data : [];
        if(printData.length === 0) {
            alert("Data tidak ditemukan.");
            return;
        }

        var rows = '';
        for (var i = 0; i < printData.length; i++) {
            var l = printData[i];
            var fotoHtml = '';
            var printFotoList = Array.isArray(l.foto) ? l.foto : [];
            for (var j = 0; j < printFotoList.length; j++) {
                fotoHtml += '<img src="' + printFotoList[j] + '" width="60">';
            }
            var printPetugas = Array.isArray(l.petugas) ? l.petugas : [];
            rows += '<tr><td>' + (i+1) + '</td><td>' + l.tanggal + ' ' + l.waktu + '</td><td>' + l.area + '</td><td>' + printPetugas.join(', ') + '</td><td>' + l.keterangan + '</td><td>' + fotoHtml + '</td></tr>';
        }

        document.getElementById('printArea').innerHTML = '<div style="text-align:center"><h3>REKAPITULASI DAILY LOGBOOK</h3><p>Periode: ' + from + ' s/d ' + to + '</p></div><table border="1" style="width:100%; border-collapse: collapse; font-size: 12px"><thead><tr bgcolor="#eee"><th>No</th><th>Waktu</th><th>Area</th><th>Petugas</th><th>Keterangan</th><th>Foto</th></tr></thead><tbody>' + rows + '</tbody></table>';
        setTimeout(function() { window.print(); }, 100);
    }).catch(function(err) {
        console.error("fetchForPrint unexpected error:", err);
        alert("Terjadi kesalahan saat menyiapkan data cetak");
    });
}

// Fungsi untuk set active menu
function setActiveMenu(element) {
    // Remove active class from all menu items (ES5-compatible)
    var links = document.querySelectorAll('#sidebar ul li a');
    for (var i = 0; i < links.length; i++) {
        links[i].classList.remove('active');
    }
    // Add active class to clicked item
    element.classList.add('active');
}

// Expose logout function locally if not already available from logic.js
if (typeof window.logout === 'undefined') {
    window.logout = async function() {
        const confirmLogout = confirm('Apakah Anda yakin ingin keluar dari sistem?');
        if (!confirmLogout) return false;
        
        try {
            sessionStorage.clear();
            localStorage.clear();
            
            if (window.supabaseClient && window.supabaseClient.auth) {
                await window.supabaseClient.auth.signOut();
            }
            
            window.location.href = 'index.html';
            return true;
        } catch (error) {
            console.error('Logout error:', error);
            sessionStorage.clear();
            localStorage.clear();
            window.location.href = 'index.html';
            return true;
        }
    };
}

document.addEventListener('DOMContentLoaded', function() {

    // Ensure logout function is available
    if (typeof window.logout === 'undefined' && typeof logout !== 'undefined') {
        window.logout = logout;
    }
    
    // Wait for Supabase to load before showing home
    setTimeout(function() {
        showHome();
    }, 500);
});
</script>
